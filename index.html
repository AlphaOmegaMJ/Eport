<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Michael John Ilagan – E-Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #090c10;
    --mid: #12181f;
    --text: #f0ece4;
    --muted: #8a8a8a;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 48px;
    background: linear-gradient(to bottom, rgba(9,12,16,0.95), transparent);
  }

  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(240,236,228,0.75);
    text-decoration: none;
    position: relative;
    transition: color 0.3s;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.35s ease;
  }

  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after { width: 100%; }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background image layer */
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1600&q=80') center/cover no-repeat;
    filter: blur(3px) brightness(0.35) saturate(0.6);
    transform: scale(1.06);
    animation: slowZoom 20s ease-in-out infinite alternate;
  }

  @keyframes slowZoom {
    from { transform: scale(1.06); }
    to   { transform: scale(1.12); }
  }

  /* Dark gradient overlay */
  .hero-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 60%, rgba(201,168,76,0.08) 0%, transparent 65%),
      linear-gradient(to bottom, rgba(9,12,16,0.3) 0%, rgba(9,12,16,0.6) 100%);
  }

  /* Decorative corner lines */
  .corner {
    position: absolute;
    width: 60px; height: 60px;
    opacity: 0.45;
  }
  .corner-tl { top: 80px; left: 48px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 80px; right: 48px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 48px; left: 48px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 48px; right: 48px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  /* Center content */
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label-top {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 7vw, 6.5rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    line-height: 1.05;
    color: var(--text);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .hero-name span {
    display: block;
    font-weight: 700;
    color: var(--gold-light);
  }

  .divider {
    margin: 28px auto;
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0;
    animation: fadeUp 1s 0.75s ease forwards;
  }

  .hero-sub {
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(240,236,228,0.6);
    opacity: 0;
    animation: fadeUp 1s 0.9s ease forwards;
  }

  /* Scroll hint */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 1s 1.4s ease forwards;
  }

  .scroll-hint span {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
    50%       { opacity: 1;   transform: scaleY(1); }
  }

  /* ── FILL IFRAME ── */
  html, body { height: 100vh; overflow: hidden; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 18px 20px; }
    .nav-links { gap: 18px; }
    .nav-links a { font-size: 0.65rem; letter-spacing: 0.1em; }
    .corner { width: 36px; height: 36px; }
    .corner-tl, .corner-tr { top: 72px; }
    .corner-tl, .corner-bl { left: 20px; }
    .corner-tr, .corner-br { right: 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="#">Michael's E-Portfolio</a>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Subjects</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="hero-content">
    <p class="label-top">E-Portfolio</p>
    <h1 class="hero-name">
      Michael John<span>Ilagan</span>
    </h1>
    <div class="divider"></div>
    <p class="hero-sub">Computer Science Student &nbsp;|&nbsp; AI &amp; System Development</p>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

</body>
<script>
  // Tell the parent Google Sites page how tall this content is
  // so the iframe can be resized to fill the section
  function sendHeight() {
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'setHeight', height: h }, '*');
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
</script>
</html>
